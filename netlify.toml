[build]
base = "frontend"
command = "npm run build"
publish = ".next"

# Next.js configuration
[build.environment]
NEXT_PUBLIC_STRAPI_URL = "https://my-website-project-ynpr.onrender.com"
NODE_VERSION = "20"

# Functions
[functions]
directory = ".next/server"

# Redirects for Next.js
[[redirects]]
from = "/*"
to = "/index.html"
status = 404
